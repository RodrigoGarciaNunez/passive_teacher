#dev
services:
  passive_teacher_app:
    build:
      context: ${CONTEXT_PATH}  #IMPORTANTE
      dockerfile: docker/passive_teacher_app_dev.dockerfile
      args: 
        - REQUIREMENTS_FILE=${REQUIREMENTS_FILE}
        - APP_MAIN_DIR=${APP_MAIN_DIR}
    environment:
      - TELEGRAM_CHANNEL_LINK=${TELEGRAM_CHANNEL_LINK}
    container_name: passive_teacher_app
    #command: ["executable", "arg"]
    ports:
      - 8050:8080
    volumes: 
      - ${APP_MAIN_DIR}/view:/app/passive_teacher/view
      - ${APP_MAIN_DIR}/controller:/app/passive_teacher/controller
    #working_dir:
    #command: tail
    #  -f /dev/null 
    command: ["python3", "-m", "controller.main"]
    depends_on:
      - files_container
    networks:
      - passive_teacher_network


  files_container:
    image: nginx:alpine
    container_name: files_container
    ports:
      - 8030:80
    volumes:
      - ${CHEATSHEETS_DIR}:/usr/share/nginx/html:ro
      - ${NGINX_CONFIG_FILES_CONTAINER}:/etc/nginx/conf.d/default.conf:ro 
    networks:
      - passive_teacher_network
    # depends_on:
    #   - nginx_server

  sender_container:
    build:
      context: ${CONTEXT_PATH}  #IMPORTANTE
      dockerfile: docker/passive_teacher_sender_dev.dockerfile
      args:
        - REQUIREMENTS_FILE=${REQUIREMENTS_FILE}
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
    container_name: sender_container
    ports:
      - 8020:80
    volumes:
      - ${SENDER_SCRIPT_DIR}:/app/passive_teacher/scripts
      - ${APP_MAIN_DIR}/model:/app/passive_teacher/model:ro
    command: [bash, -c, "chmod  +x /app/passive_teacher/scripts/passive_teacher.sh; ./scripts/passive_teacher.sh"]
  
    networks:
      - passive_teacher_network
    depends_on:
      - files_container



  nginx_server:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - 8080:80
    volumes:
      - ${NGINX_REVERSE_PROXY_CONF}:/etc/nginx/nginx.conf
      - ${NGINX_REVERSE_PROXY_DEFAULT_CONF}:/etc/nginx/conf.d/default.conf
    command: ["nginx", "-g", "daemon off;"]  #asegura que nginx se inicalice
    networks:
      - passive_teacher_network
    
    depends_on:
      - files_container
      - passive_teacher_app



networks:
  passive_teacher_network:
    driver: bridge




