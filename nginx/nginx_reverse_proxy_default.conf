####  ¡¡¡¡ este config es para ser montado al contendor. NO USO EN HOST !!!!!
    
server {
    listen       80;
    listen  [::]:80;
    server_name  server;    

    location = / {
        return 302 $scheme://$http_host/passive_teacher_app/;
    }


    location /passive_teacher_app/ {
        limit_req zone=mylimit burst=20;
        proxy_pass http://passive_teacher_app:8080/;  

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-Prefix /passive_teacher_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /files_container/ {
        limit_req zone=mylimit burst=20;
        proxy_pass http://files_container:80/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;  
        proxy_set_header X-Forwarded-Prefix /files_container;
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

}   
